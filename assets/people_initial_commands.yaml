behavior_catalog:
  native:
    - idle
    - move_to
    - move_along
    - follow
    - dodge
    - fall
    - sit
    - ride
    - pickup_object
    - place_object
    - release_object
    - custom_action
    - look_at
    - reach_hand
    - pose_hand
    - reset
    - teleport
  scheduler:
    - wait
    - repeat
  composite:
    - patrol
    - look_around
    - talk
    - talk_with

buttons:
  - label: "Initialize"
    action: "reset"
    scenario: "initialize"

  - label: "GoTo"
    action: "go_to_selected"
    scenario: "selected_goto"

  - label: "Look Around"
    action: "look_at_all"
    duration: 8
    radius: 4

  - label: "Set patrol"
    scenario: "set_patrol"

  - label: "Set Sit"
    scenario: "set_sit"

  - label: "Set Talk"
    scenario: "set_talk"

  - label: "-"

  - label: "-"

  - label: "Reset"
    action: "reset"
    scenario: "idle_all"

seat_couch: &seat_couch
  hips_offset: [0.0, 0.0, 0.1]
  hips_rotation: [90.0, 0.0, 0.0]
  snap_to_seat: true

seat_wheelchair: &seat_wheelchair
  hips_offset: [0.0, 0.0, 0.13]
  hips_rotation: [90.0, 0.0, 0.0]
  snap_to_seat: true

seat_office_chair: &seat_office_chair
  hips_offset: [0.0, 0.0, 0.12]
  hips_rotation: [90.0, 0.0, 0.0]
  snap_to_seat: true

talk_gesture: &talk_gesture
  hand: right
  sequence: [open, point, relaxed]
  interval: 1.8

scenarios:
  initialize:
    label: "Initialize characters"
    actions:
      - character: Female_visitor_02
        action: sit
        target:
          <<: *seat_couch
          prim: /World/Chair/SM_Chair_02a7_01
      - character: Male_visitor_02
        action: sit
        target:
          <<: *seat_couch
          prim: /World/Chair/SM_Chair_02a7_03
      - character: Male_visitor_01
        action: sit
        target:
          <<: *seat_couch
          prim: /World/Chair/SM_Chair_02a4_03
      - character: Female_nurse_02

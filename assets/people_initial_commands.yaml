          - type: command
            command: "Male_police_01 GoTo 6.7 0.0 0.0 -90.0"
          - type: command
            command: "Male_police_01 GoTo -2.3 1.91 0.0 -90.0"
      Male_patient_02:
        type: repeat
        count: inf
        steps:
          - type: command
            command: "Male_patient_02 GoTo -32.6271 3.23897 0.0 -90.0"
          - type: command
            command: "Male_patient_02 LookAround 60"
          - type: command
            command: "Male_patient_02 GoTo -3.99849 11.27831 0.0 90.0"
          - type: command
            command: "Male_patient_02 LookAround 60"
      Female_patient_04:
        type: repeat

          - position: [5.0, 10.1, 0.0]
            yaw: 0.0
          - position: [6.7, 0.0, 0.0]
            yaw: -90.0
          - position: [-2.3, 1.91, 0.0]
            yaw: -90.0
      - character: Male_patient_02
        repeat: forever
        steps:
          - action: move_to
            position: [-32.6271, 3.23897, 0.0]
            yaw: -90.0
          - action: look_around
            duration: 60
          - action: move_to
            position: [-3.99849, 11.27831, 0.0]
            yaw: 90.0
          - action: look_around
            duration: 60
      - character: Female_patient_04
        repeat: forever
        steps:
          - action: move_to
            position: [-41.11112, 28.52735, 0.0]
            yaw: 0.0
          - action: move_to
            position: [-39.84272, 13.08673, 0.0]
            yaw: 90.0
          - action: move_to
            position: [-25.59104, 4.74649, 0.0]
            yaw: 90.0
          - action: move_to
            position: [-10.54612, 0.84, 0.0]
            yaw: 90.0
          - action: look_around
            duration: 10
          - action: move_to
            position: [-39.84272, 13.08673, 0.0]
            yaw: 180.0


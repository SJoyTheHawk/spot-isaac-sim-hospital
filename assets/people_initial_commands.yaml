      Female_visitor_04:
        type: command
        command: "Female_visitor_04 LookAround 9999"
      Female_nurse_04:
        type: repeat
        count: inf
        steps:
          - type: command
            command: "Female_nurse_04 Sit /World/Chair/SM_Chair_04a2_88 10"
          - type: command
            command: "Female_nurse_04 Idle 10"
      Female_police_01:

      - "Male_nurse_04 Talk Male_nurse_02 9999"
      - "Female_nurse_05 Talk Male_patient_05 9999"
      - "Male_nurse_05 TalkWith Female_patient_05 9999"

  selected_goto:
    label: "GoTo"
    characters:
      "{character}":
        type: command
        command: "{character} GoTo {x} {y} 0.0 {r}"

  look_around:
    label: "Look Around"

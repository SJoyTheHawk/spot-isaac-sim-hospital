        target:
          <<: *seat_office_chair
          prim: /World/Chair/SM_Chair_01a7
      - character: Male_nurse_04
        action: talk
        target_character: Male_nurse_02
        duration: 9999
        gesture: *talk_gesture
      - character: Female_nurse_05
        action: talk_with
        target_character: Male_patient_05
        duration: 9999
        gesture: *talk_gesture
      - character: Male_nurse_05
        action: talk_with
        target_character: Female_patient_05
        duration: 9999
        gesture: *talk_gesture
      - character: Female_visitor_04
        action: look_around
        duration: 9999
      - character: Female_nurse_04
        repeat: forever
        steps:
          - action: sit
            duration: 10
            target:
              <<: *seat_couch
              prim: /World/Chair/SM_Chair_04a2_88
          - action: idle
            duration: 10
      - character: Female_police_01
        action: patrol
        repeat: forever
        points:
          - position: [19.2, 30.89, 0.0]
            yaw: 0.0
          - position: [17.5, 3.19, 0.0]
            yaw: 180.0
      - character: Female_patient_02
        repeat: forever
        steps:
          - action: move_to
            position: [6.53459, 17.05795, 0.0]
            yaw: 90.0
          - action: wait
            seconds: 60
          - action: move_to
            position: [6.89391, 5.64066, 0.0]
            yaw: -90.0
          - action: wait
            seconds: 20
      - character: Male_police_01
        action: patrol
        repeat: forever

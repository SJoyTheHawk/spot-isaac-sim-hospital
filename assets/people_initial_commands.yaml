buttons:
  - label: "Initialize"
    action: "reset"
    scenario: "initialize"

  - label: "GoTo"
    scenario: "selected_goto"

  - label: "Look Around"
    action: "look_at_all"
    duration: 8
    radius: 4

  - label: "Set patrol"
    scenario: "set_patrol"

  - label: "Set Sit"
    scenario: "set_sit"

  - label: "Set Talk"
    scenario: "set_talk"

  - label: "-"

  - label: "-"

  - label: "Reset"
    action: "reset"
    scenario: "idle_all"

scenarios:
  initialize:
    label: "Initialize characters"
    type: commands
    characters:
      Female_visitor_02:
        type: command
        command: "Female_visitor_02 Sit /World/Chair/SM_Chair_02a7_01 9999"
      Male_visitor_02:
        type: command
        command: "Male_visitor_02 Sit /World/Chair/SM_Chair_02a7_03 9999"
      Male_visitor_01:
        type: command
        command: "Male_visitor_01 Sit /World/Chair/SM_Chair_02a4_03 9999"
      Female_nurse_02:
        type: command
